<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | Tea & Coffee</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .food-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .food-image {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <h1>🍔 FoodDash</h1>
            <span>Fast delivery</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="fastfood.html">🍟 Fast Food</a>
            <a href="snacks.html">🍿 Snacks</a>
            <a href="seafood.html">🦞 Seafood</a>
            <a href="tea-coffee.html" class="active">☕ Tea & Coffee</a>
            <a href="bakery.html">🥖 Bakery</a>
            <button class="cart-btn" onclick="window.location.href='cart.html'">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </div>

    <div class="hero">
        <h2>☕ Tea & Coffee</h2>
        <p>Freshly brewed just for you</p>
    </div>

    <div id="foodGrid" class="food-grid"></div>

    <div class="footer">
        <p>© 2024 FoodDash | Delivering happiness</p>
    </div>

    <script>
        const teaCoffee = [
            { 
                id: 1, 
                name: "Cappuccino", 
                desc: "Espresso, steamed milk, foam", 
                price: 350, 
                image: "☕",
                imgUrl: "https://i.pinimg.com/736x/52/41/31/52413159c7f291bbc186422481b3ac50.jpg"
            },
            { 
                id: 2, 
                name: "Latte", 
                desc: "Smooth espresso with milk", 
                price: 380, 
                image: "☕",
                imgUrl: "https://i.pinimg.com/736x/b8/4c/9d/b84c9db0910aa8247d79b69a4ecd1438.jpg"
            },
            { 
                id: 3, 
                name: "Masala Chai", 
                desc: "Spiced Indian tea with milk", 
                price: 250, 
                image: "🍵",
                imgUrl: "https://i.pinimg.com/736x/a1/16/c8/a116c8bba3420dd89a67e39434a4d0d6.jpg"
            },
            { 
                id: 4, 
                name: "Green Tea", 
                desc: "Fresh brewed green tea", 
                price: 200, 
                image: "🍵",
                imgUrl: "https://i.pinimg.com/736x/c0/3b/d1/c03bd159756dc48babac8ac73dabe696.jpg"
            },
            { 
                id: 5, 
                name: "Espresso", 
                desc: "Strong single shot", 
                price: 250, 
                image: "☕",
                imgUrl: "https://i.pinimg.com/736x/4c/28/e2/4c28e2420bf38c50120dba0cbaf42e8d.jpg"
            },
            { 
                id: 6, 
                name: "Iced Coffee", 
                desc: "Chilled coffee with ice", 
                price: 300, 
                image: "🧋",
                imgUrl: "https://i.pinimg.com/736x/da/6f/3a/da6f3a6305596079b891bdb35d53b5f4.jpg"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('fooddash_cart')) || [];

        function saveCart() { 
            localStorage.setItem('fooddash_cart', JSON.stringify(cart)); 
            updateCartCount(); 
        }

        function updateCartCount() { 
            const total = cart.reduce((s, i) => s + i.quantity, 0); 
            const el = document.getElementById('cartCount'); 
            if (el) el.innerText = total; 
        }

        function addToCart(food) { 
            const existing = cart.find(i => i.name === food.name); 
            if (existing) { 
                existing.quantity++; 
            } else { 
                cart.push({ name: food.name, price: food.price, quantity: 1, image: food.image }); 
            } 
            saveCart(); 
            alert(`✅ ${food.name} added to cart!`); 
        }

        window.addToCart = addToCart;

        function render() { 
            const grid = document.getElementById('foodGrid'); 
            grid.innerHTML = teaCoffee.map(f => `
                <div class="food-card">
                    <div class="food-image">
                        <img src="${f.imgUrl}" alt="${f.name}" 
                             onerror="this.style.display='none'; this.parentElement.innerHTML='${f.image}'" 
                             style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="food-info">
                        <h3>${f.name}</h3>
                        <div class="food-desc">${f.desc}</div>
                        <div class="food-price">KSH ${f.price.toLocaleString()}</div>
                        <button class="add-btn" onclick="addToCart({name:'${f.name}', price:${f.price}, image:'${f.image}'})">Add to Cart</button>
                    </div>
                </div>
            `).join(''); 
        }

        render(); 
        updateCartCount();
    </script>
</body>
</html>
