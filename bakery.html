<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | Bakery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .food-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .food-image {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <h1>🍔 FoodDash</h1>
            <span>Fast delivery</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="fastfood.html">🍟 Fast Food</a>
            <a href="snacks.html">🍿 Snacks</a>
            <a href="seafood.html">🦞 Seafood</a>
            <a href="tea-coffee.html">☕ Tea & Coffee</a>
            <a href="bakery.html" class="active">🥖 Bakery</a>
            <button class="cart-btn" onclick="window.location.href='cart.html'">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </div>

    <div class="hero">
        <h2>🥖 Bakery</h2>
        <p>Freshly baked daily</p>
    </div>

    <div id="foodGrid" class="food-grid"></div>

    <div class="footer">
        <p>© 2024 FoodDash | Delivering happiness</p>
    </div>

    <script>
        const bakery = [
            { 
                id: 1, 
                name: "Croissant", 
                desc: "Buttery, flaky pastry", 
                price: 250, 
                image: "🥐",
                imgUrl: "https://i.pinimg.com/736x/f8/82/8e/f8828e68483d5db8384de415b707d0ec.jpg"
            },
            { 
                id: 2, 
                name: "Chocolate Cake Slice", 
                desc: "Rich chocolate layer cake", 
                price: 350, 
                image: "🍰",
                imgUrl: "https://i.pinimg.com/736x/51/56/76/515676b734cf7760ce1456248fbf07a5.jpg"
            },
            { 
                id: 3, 
                name: "Blueberry Muffin", 
                desc: "Fresh baked with real blueberries", 
                price: 200, 
                image: "🧁",
                imgUrl: "https://i.pinimg.com/736x/60/77/b0/6077b036565b305d54fa6a8f272bb8e9.jpg"
            },
            { 
                id: 4, 
                name: "Baguette", 
                desc: "Fresh French bread", 
                price: 180, 
                image: "🥖",
                imgUrl: "https://i.pinimg.com/1200x/3e/4f/21/3e4f2182adbb9752d2d173384cbd75d9.jpg"
            },
            { 
                id: 5, 
                name: "Cinnamon Roll", 
                desc: "Warm with cream cheese icing", 
                price: 280, 
                image: "🥨",
                imgUrl: "https://i.pinimg.com/736x/67/da/d7/67dad7b7c003bfb1e73387bfcad91faa.jpg"
            },
            { 
                id: 6, 
                name: "Banana Butter Cake", 
                desc: "Moist banana cake with butter glaze", 
                price: 320, 
                image: "🍌🍰",
                imgUrl: "https://i.pinimg.com/1200x/98/5f/83/985f83882eb912e632a3cc118d988fcb.jpg"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('fooddash_cart')) || [];

        function saveCart() { 
            localStorage.setItem('fooddash_cart', JSON.stringify(cart)); 
            updateCartCount(); 
        }

        function updateCartCount() { 
            const total = cart.reduce((s, i) => s + i.quantity, 0); 
            const el = document.getElementById('cartCount'); 
            if (el) el.innerText = total; 
        }

        function addToCart(food) { 
            const existing = cart.find(i => i.name === food.name); 
            if (existing) { 
                existing.quantity++; 
            } else { 
                cart.push({ name: food.name, price: food.price, quantity: 1, image: food.image }); 
            } 
            saveCart(); 
            alert(`✅ ${food.name} added to cart!`); 
        }

        window.addToCart = addToCart;

        function render() { 
            const grid = document.getElementById('foodGrid'); 
            grid.innerHTML = bakery.map(f => `
                <div class="food-card">
                    <div class="food-image">
                        <img src="${f.imgUrl}" alt="${f.name}" 
                             onerror="this.style.display='none'; this.parentElement.innerHTML='${f.image}'" 
                             style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="food-info">
                        <h3>${f.name}</h3>
                        <div class="food-desc">${f.desc}</div>
                        <div class="food-price">KSH ${f.price.toLocaleString()}</div>
                        <button class="add-btn" onclick="addToCart({name:'${f.name}', price:${f.price}, image:'${f.image}'})">Add to Cart</button>
                    </div>
                </div>
            `).join(''); 
        }

        render(); 
        updateCartCount();
    </script>
</body>
</html>
